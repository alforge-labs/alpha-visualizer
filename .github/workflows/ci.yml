name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.19"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Test (pytest)
        run: uv run pytest tests/ -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (eslint)
        run: pnpm run lint

      - name: Test (vitest)
        run: pnpm run test:ci

      - name: Build (tsc -b && vite build)
        run: pnpm run build

      - name: Bundle size check (size-limit)
        run: pnpm run size

  # issue #225: wheel / sdist に frontend の static/ が同梱されることを PR 時点で検証する。
  # （static/ は .gitignore 管理のため hatchling の既定挙動では除外される。
  #   pyproject の force-include 設定が欠落・破損していないかをここで検出する）
  packaging:
    name: Packaging (wheel/sdist contain static)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.19"

      - name: Set up Python
        run: uv python install 3.12

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install pnpm dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

      - name: Build wheel and sdist
        run: uv build

      - name: Verify build artifacts contain frontend assets
        run: uv run python scripts/verify_build_artifacts.py dist/

  openapi-types:
    name: OpenAPI types drift check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.19"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install pnpm dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Regenerate OpenAPI schema and TS types
        working-directory: frontend
        run: pnpm run gen

      - name: Verify generated files are committed
        run: |
          if ! git diff --exit-code frontend/openapi.json frontend/src/api/types.gen.ts; then
            echo "::error::OpenAPI schema or generated TS types are out of date."
            echo "Run 'cd frontend && pnpm run gen' locally and commit the changes."
            exit 1
          fi

  fixture-drift:
    name: E2E fixture drift check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.19"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --all-extras

      # SQLite DB はヘッダに書き込みライブラリのバージョンを記録するため、
      # バイナリ git diff ではなく SQL ダンプの論理比較で検証する（#223）。
      - name: Snapshot committed fixture DB
        run: cp frontend/e2e/fixtures/forge/data/results/backtest_results.db /tmp/committed_fixture.db

      - name: Regenerate E2E fixture
        run: uv run python tests/fixtures/build_e2e_fixture.py

      - name: Verify fixture is committed
        run: |
          if ! uv run python scripts/compare_sqlite_dump.py /tmp/committed_fixture.db frontend/e2e/fixtures/forge/data/results/backtest_results.db; then
            echo "::error::E2E fixture DB is out of date (logical dump differs)."
            echo "Run 'uv run python tests/fixtures/build_e2e_fixture.py' locally and commit the changes."
            exit 1
          fi
          if ! git diff --exit-code -- frontend/e2e/fixtures/ ':(exclude)frontend/e2e/fixtures/forge/data/results/backtest_results.db'; then
            echo "::error::E2E fixture is out of date."
            echo "Run 'uv run python tests/fixtures/build_e2e_fixture.py' locally and commit the changes."
            exit 1
          fi

  samples-drift:
    name: OSS sample-forge drift check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.19"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --all-extras

      # SQLite DB はバイナリ比較ではなく SQL ダンプの論理比較で検証する（#223）。
      - name: Snapshot committed samples DB
        run: cp samples/sample-forge/data/results/backtest_results.db /tmp/committed_samples.db

      - name: Regenerate OSS sample dataset
        run: uv run python samples/build_samples.py

      - name: Verify sample-forge is committed (determinism)
        run: |
          if ! uv run python scripts/compare_sqlite_dump.py /tmp/committed_samples.db samples/sample-forge/data/results/backtest_results.db; then
            echo "::error::samples/sample-forge/ DB is out of date (logical dump differs)."
            echo "Run 'uv run python samples/build_samples.py' locally and commit the changes."
            exit 1
          fi
          if ! git diff --exit-code -- samples/sample-forge/ ':(exclude)samples/sample-forge/data/results/backtest_results.db'; then
            echo "::error::samples/sample-forge/ is out of date."
            echo "Run 'uv run python samples/build_samples.py' locally and commit the changes."
            exit 1
          fi

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.19"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install pnpm dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}

      - name: Install Playwright browsers (cold)
        working-directory: frontend
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        working-directory: frontend
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

      - name: Run Playwright tests
        working-directory: frontend
        env:
          CI: 'true'
        run: pnpm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 14

  e2e-samples:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.19"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install pnpm dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}

      - name: Install Playwright browsers (cold)
        working-directory: frontend
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        working-directory: frontend
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

      - name: Run Playwright samples smoke
        working-directory: frontend
        env:
          CI: 'true'
        run: pnpm run e2e:samples

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-samples
          path: frontend/playwright-report-samples/
          retention-days: 14
