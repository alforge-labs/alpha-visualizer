name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read   # actions/checkout でリポジトリを読み取るために必要
      id-token: write  # PyPI Trusted Publisher 用
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Test (pytest)
        run: uv run pytest tests/ -q

      # Issue #149 以降、wheel に同梱する静的アセット
      # (src/alpha_visualizer/static/) はリポジトリ管理対象外。
      # PyPI 配布用に wheel build 直前で frontend を再生成する。
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (PROD bundle)
        working-directory: frontend
        run: npm run build

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
