name: 💡 機能要望（日本語）
description: alpha-visualizer の改善案・新機能を提案してください。
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        ご提案ありがとうございます。アイデアの詳細をご記入ください。
        提出前に [既存の Issue](https://github.com/alforge-labs/alpha-visualizer/issues?q=is%3Aissue+label%3Aenhancement) を検索し、重複を避けてください。

  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題・動機
      description: この機能が解決する問題は何ですか？ユースケースを教えてください。
      placeholder: 5戦略以上を比較する際に...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 提案する解決策
      description: どのように動作してほしいか、UI スケッチ・API モック・サンプルコードなどあれば歓迎です。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
      description: 他に検討したアプローチがあればご記入ください。

  - type: textarea
    id: additional
    attributes:
      label: 追加情報
      description: スクリーンショット、他ツールでの類似機能へのリンクなど。
