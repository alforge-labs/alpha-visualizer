version: 2
updates:
  # Python パッケージ（uv エコシステム: pyproject.toml + uv.lock を解析し、
  # 推移的依存も含めた定期 version-update を発行できる。pip では uv.lock の
  # 推移的依存を bump できないため uv を使用する）
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore"
      include: "scope"

  # フロントエンド npm
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      visx:
        patterns:
          - "@visx/*"
      eslint:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript-eslint"
      testing-library:
        patterns:
          - "@testing-library/*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      storybook:
        patterns:
          - "storybook"
          - "@storybook/*"

  # GitHub Actions ワークフロー
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"
