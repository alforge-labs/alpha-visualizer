[changelog]
header = """
# Changelog

alpha-visualizer の全バージョン変更履歴です。

"""
body = """
{% if version %}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}
## [unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message }}\
{% if commit.breaking %} [**破壊的変更**]{% endif %}

{% endfor %}
{% endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat", group = "新機能" },
  { message = "^fix", group = "バグ修正" },
  { message = "^refactor", group = "リファクタリング" },
  { message = "^perf", group = "パフォーマンス改善" },
  { message = "^docs", group = "ドキュメント" },
  { message = "^test", group = "テスト" },
  { message = "^ci", group = "CI/CD" },
  { message = "^chore", group = "その他" },
  { message = "^Merge", skip = true },
]
filter_commits = true
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
